<!--
    這個網頁示範如何使用 Google Static Map API 來抓取道路圖片
    https://developers.google.com/maps/documentation/maps-static/start
-->
<html lang="zh-tw">
    <head>
        <meta charset="UTF-8">
        <title>Google Static Map - Basic</title>
        <link rel="stylesheet" href="/css/common.css">
        <script>
            const GetMap = function() {
                // 如果是空字串或null，則用後面的字串來parse
                const lat     = parseFloat(document.getElementById('lat').value    || '25.013640');
                const lng     = parseFloat(document.getElementById('lng').value    || '121.540675');
                const zoom    = parseInt  (document.getElementById('zoom').value   || '20');
                const width   = parseInt  (document.getElementById('width').value  || '640');
                const height  = parseInt  (document.getElementById('height').value || '640');
                const mapType = document.getElementById("mapType").value || 'roadmap';
                const key     = document.getElementById('key').value || '';

                // 生成 URL
                const staticURL = `https://maps.googleapis.com/maps/api/staticmap?center=${lat},${lng}&zoom=${zoom}&size=${width}x${height}&maptype=${mapType}&key=${key}`;
                document.getElementById('map').src = staticURL;
                if (key != '')
                    document.getElementById('showStaticURL').innerHTML = `Static Map URL = <a href=${staticURL} target="_blank" title="新分頁開啟">${staticURL}</a>`;
            }

            const Reset = function() {
                // 載入預設值
                document.getElementById('lat').value     = '25.013640';
                document.getElementById('lng').value     = '121.540675';
                document.getElementById('zoom').value    = '20';
                document.getElementById('width').value   = '640';
                document.getElementById('height').value  = '640';
                document.getElementById("mapType").value = 'roadmap';
                document.getElementById('key').value     = '';

                GetMap();
            }

            window.addEventListener('load', Reset);
        </script>
    </head>
    <body>
        <header>
            <a href="/index.html" class="home_icon"><img src="/img/google_material_icon_home.png"></a>
            > Google Static Map API - 基礎範例
        </header>

        <div style="display: grid; grid-template-columns: 3fr 6fr; gap: 5%">
            <div>
                <p>這個網頁示範如何使用 Google Static Map API 來抓取道路圖片，你需要自備 API Key <br/>
                <a href="https://developers.google.com/maps/documentation/maps-static/start">參考資料</a></p>
            
                <form id="paramForm">
                    <label for="lat">緯度：</label>
                    <input name="lat" type="number" step="0.0001" id="lat" onchange="GetMap()">
            
                    <br/>
                    <label for="lng">經度：</label>
                    <input name="lng" type="number" step="0.0001" id="lng" onchange="GetMap()">
                    
                    <br/>
                    <label for="zoom"  style="width: 32%; display:inline-block;">Zoom（0 ~ 21）：</label>
                    <input name="zoom" type="number" min="0" max="21" id="zoom" onchange="GetMap()">
            
                    <br/>
                    <label for="width"  style="width: 32%; display:inline-block;">Width（0 ~ 640）：</label>
                    <input name="width" type="number" step="10" min="0" max="640" id="width" onchange="GetMap()">
            
                    <br/>
                    <label for="height"  style="width: 32%; display:inline-block;">Height（0 ~ 640）：</label>
                    <input name="height" type="number" step="10" min="0" max="640" id="height" onchange="GetMap()">
            
                    <br/>
                    <label for="key">API Key：</label>
                    <input name="key"   style="width:100%;" type="text" id="key" onchange="GetMap()">
            
                    <br/>
                    <label  for="mapType">Map Type：</label>
                    <select name="mapType" id="mapType" onchange="GetMap()">
                        <option value="roadmap">roadmap</option>
                        <option value="satellite">satellite</option>
                        <option value="terrain">terrain</option>
                        <option value="hybrid">hybrid</option>
                    </select>
            
                    <br/>
                    <input style="margin-top: 10px;" type="button" onclick="Reset()" value="Reset">
                </form>
            
                <p id="showStaticURL" style="line-break: anywhere; margin-top: 10%;"></p>
            </div>
            
            <div>
                <img id="map" style="width: auto; height: auto; margin: 2%;"/>
            </div>
        </div>
    </body>
</html>
